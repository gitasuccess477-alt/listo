<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Listo - Shared List</title>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<style>
:root {
  --bg1: #f8fafc; --bg2: #edf2f7; --bg3: #e2e8f0; --bg4: #e0f2fe;
  --card: #ffffff; --text: #1e293b; --itemBg: #f1f5f9;
  --doneBg: #dcfce7; --doneBorder: #bbf7d0; --doneText: #16a34a;
  --naBg: #fee2e2; --naBorder: #fecaca; --naText: #dc2626;
  --inputBg: #ffffff; --inputBorder: #cbd5e1;
}

body.dark {
  --bg1: #0f172a; --bg2: #1e293b; --bg3: #0f172a; --bg4: #334155;
  --card: #1e293b; --text: #f8fafc; --itemBg: #0f172a;
  --doneBg: #064e3b; --doneBorder: #047857; --doneText: #4ade80;
  --naBg: #7f1d1d; --naBorder: #991b1b; --naText: #f87171;
  --inputBg: #1e293b; --inputBorder: #475569;
}

body {
  margin: 0; font-family: system-ui;
  background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4));
  background-size: 400% 400%; animation: bg 8s ease-in-out infinite;
  display: flex; flex-direction: column; align-items: center;
  padding: 15px; box-sizing: border-box; min-height: 100vh;
  transition: background 0.3s ease;
}

@keyframes bg { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

.logo { width: 90px; height: auto; margin-top: 10px; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

.container { max-width: 480px; width: 100%; margin-bottom: 20px; }

.card {
  background: var(--card); color: var(--text); padding: 20px; border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: all 0.3s ease; width: 100%; box-sizing: border-box;
}

/* FIX: PERFECT HEADER ALIGNMENT */
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.balance-box { flex: 1; text-align: left; }
.title-box { flex: 1.5; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.toggle-box { flex: 1; display: flex; justify-content: flex-end; }

.balance-lbl { margin: 0; font-size: 11px; color: #16a34a; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px;}
.balance-val { margin: 0; font-size: 18px; font-weight: 800; color: var(--text); transition: color 0.3s; }
.title { margin: 0; font-size: 20px; font-weight: bold; color: var(--text); transition: color 0.3s; white-space: nowrap; }

/* FIX: LIVE SHINING ICON */
.live-indicator { display: flex; align-items: center; gap: 5px; margin-top: 4px; font-size: 10px; font-weight: 900; text-transform: uppercase; color: #ef4444; background: #fee2e2; padding: 3px 8px; border-radius: 12px; }
.live-dot { width: 6px; height: 6px; background: #ef4444; border-radius: 50%; animation: pulse 1s infinite; }
body.dark .live-indicator { background: #7f1d1d; color: #fca5a5; }
body.dark .live-dot { background: #fca5a5; }
@keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.5; } 100% { transform: scale(0.9); opacity: 1; } }

/* FIX: TOGGLE BUTTON INSIDE CARD */
.toggle-btn {
  background: var(--inputBg); border: 1px solid var(--inputBorder); border-radius: 50%;
  width: 38px; height: 38px; font-size: 16px; cursor: pointer; display: flex;
  justify-content: center; align-items: center; color: var(--text); transition: 0.3s;
}

.cat-badge { text-align: center; font-size: 13px; font-weight: 600; color: #6366f1; background: #eef2ff; padding: 4px 15px; border-radius: 20px; width: fit-content; margin: 0 auto 15px; display: none; }
body.dark .cat-badge { background: #312e81; color: #a5b4fc; }

/* FIX: WIDER ITEM CARDS & TEXT ALIGNMENT */
.item-card {
  background: var(--itemBg); padding: 15px; border-radius: 12px; margin-bottom: 12px;
  border: 1px solid var(--bg3); width: 100%; box-sizing: border-box; transition: all 0.3s ease;
}
.item-card.done { background: var(--doneBg); border-color: var(--doneBorder); }
.item-card.na { background: var(--naBg); border-color: var(--naBorder); }

.item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }

/* TEXT COLORS FOR STATUS */
.item-text { font-size: 16px; font-weight: bold; color: var(--text); transition: color 0.3s; flex: 1; text-align: left; padding-right: 10px; }
.item-card.done .item-text { color: var(--doneText); }
.item-card.na .item-text { color: var(--naText); text-decoration: line-through; opacity: 0.8; }

.status-wrap { display: flex; align-items: center; gap: 12px; }
.status-label { font-size: 11px; font-weight: bold; text-transform: uppercase; }
.status-label.done { color: var(--doneText); }
.status-label.na { color: var(--naText); }

/* FIX: KOTLIN STYLE DELETE SVG ICON */
.delete-icon {
  color: #94a3b8; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; padding: 5px; border-radius: 50%;
}
.delete-icon:active { transform: scale(0.8); background: rgba(0,0,0,0.05); }
.delete-icon svg { width: 18px; height: 18px; }
.item-card.na .delete-icon { color: #f87171; }
.item-card.done .delete-icon { color: #4ade80; }

.price-input {
  width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--inputBorder);
  background: var(--inputBg); color: var(--text); margin-bottom: 8px; box-sizing: border-box; outline: none; font-size: 14px; transition: all 0.3s ease;
}

.row { display: flex; gap: 10px; }
.btn { flex: 1; padding: 10px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.1s; }
.btn:active { transform: scale(0.95); }
.btn-avail { background: #22c55e; }
.btn-na { background: #ef4444; }

.tagline { text-align: center; font-size: 13px; color: #16a34a; font-weight: 600; font-style: italic; margin-top: 15px; }
body.dark .tagline { color: #4ade80; }
</style>
</head>

<body>

<img src="https://image2url.com/r2/default/images/1774860458918-c6f7a05c-ca26-46e6-96fc-a7648f576bb0.png" class="logo">

<div class="container">
  <div class="card">
    
    <div class="header-top">
      <div class="balance-box">
        <p class="balance-lbl">Total Bill</p>
        <h3 id="totalDisplay" class="balance-val">₹0</h3>
      </div>
      
      <div class="title-box">
        <h2 class="title">Shared List</h2>
        <div class="live-indicator" id="liveTag" style="display:none;">
          <span class="live-dot"></span> Live
        </div>
      </div>

      <div class="toggle-box">
        <button id="themeToggle" class="toggle-btn" onclick="toggleTheme()">🌙</button>
      </div>
    </div>
    
    <div id="catName" class="cat-badge"></div>
    <div id="list" style="text-align:center; color:#94a3b8; font-style:italic; padding:20px;">Scanning...</div>
  </div>
  <p class="tagline">Listo apnaiye: List banegi digital, shopping hogi simple!</p>
</div>

<script>
// 🔥 Firebase Init
const firebaseConfig = {
  apiKey: "AIzaSyBbBsz8FgD6_5WKbCvfqtEkPLa9q_PIhuA",
  authDomain: "listo-356ba.firebaseapp.com",
  projectId: "listo-356ba",
  storageBucket: "listo-356ba.firebasestorage.app",
  messagingSenderId: "104729909475",
  appId: "1:104729909475:web:fb3bd44800d371b7748dd6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 Params
const params = new URLSearchParams(location.search);
const uid = params.get("uid");
const data = params.get("data");
const appTheme = params.get("theme");

let globalItems = [];
let currentCategory = "";
let syncTimeout;

const listDiv = document.getElementById("list");
const totalDiv = document.getElementById("totalDisplay");
const catDiv = document.getElementById("catName");
const themeBtn = document.getElementById("themeToggle");

// 🔥 Theme System
function toggleTheme(){
  document.body.classList.toggle("dark");
  const isDark = document.body.classList.contains("dark");
  localStorage.setItem("theme", isDark);
  themeBtn.innerText = isDark ? "☀️" : "🌙";
}
if(appTheme === "dark" || localStorage.getItem("theme") === "true") {
    document.body.classList.add("dark");
    themeBtn.innerText = "☀️";
}

// 🔥 CRITICAL FIX: Sort function (Pending -> Available -> N/A)
function sortItems() {
  const order = { "pending": 1, "done": 2, "na": 3 };
  globalItems.sort((a, b) => order[a.status] - order[b.status]);
}

// 🔥 QR Parse & Tagging
if(data){
  try {
    const decoded = decodeURIComponent(data);
    let lines = decoded.split('\n').map(l => l.trim()).filter(l => l !== "");
    let tempItems = [];

    lines.forEach(line => {
        if (line.toUpperCase().includes("LISTO")) {
            let catRawName = line.replace(/LISTO/i, "").replace(/:$/, "").trim();
            if(catRawName === "Show Item" || catRawName === "Full List"){
                currentCategory = catRawName === "Full List" ? "Full List" : "root"; 
            } else {
                currentCategory = catRawName;
            }
            if(catRawName) {
                catDiv.innerText = catRawName;
                catDiv.style.display = "block";
            }
        } else {
            // Tagging the category for Full List deletion sync
            tempItems.push({ 
                name: line.replace(/^\d+[\.\)]\s*/, ""), 
                price: "", 
                status: "pending",
                _cat: currentCategory === "Full List" ? "root" : currentCategory // Default to root if scanned directly as full list without DB
            });
        }
    });
    globalItems = tempItems;
    sortItems();
    renderUI();
  } catch(e) {
    listDiv.innerHTML = "Error parsing QR";
  }
}

// 🔥 Firestore Dual Sync (With Full List Edit Fix)
if(uid){
  document.getElementById("liveTag").style.display = "flex";
  db.collection("users").doc(uid).onSnapshot(doc => {
    if(doc.exists){
      if (doc.metadata.hasPendingWrites) return;

      const dataObj = doc.data();
      
      if(currentCategory === "Full List") {
          let mergedItems = [];
          // Root items tag
          (dataObj.items || []).forEach(it => mergedItems.push({...it, _cat: 'root'}));
          
          // Category items tag
          if(dataObj.categories) {
              Object.keys(dataObj.categories).forEach(catKey => {
                  (dataObj.categories[catKey].items || []).forEach(it => mergedItems.push({...it, _cat: catKey}));
              });
          }
          globalItems = mergedItems;
      } 
      else if (currentCategory && currentCategory !== "root" && dataObj.categories && dataObj.categories[currentCategory]) {
          globalItems = (dataObj.categories[currentCategory].items || []).map(it => ({...it, _cat: currentCategory}));
      } else {
          globalItems = (dataObj.items || []).map(it => ({...it, _cat: 'root'}));
      }

      sortItems();
      renderUI();
    }
  });
}

// 🔥 Delete Item with Alert (Now works in Full List too)
window.deleteItem = function(i) {
  if (confirm("Are you sure you want to delete '" + globalItems[i].name + "'?\n\nPress OK to delete.")) {
      globalItems.splice(i, 1);
      renderUI();
      scheduleSync();
  }
}

// 🔥 Render UI
function renderUI(){
  listDiv.innerHTML = "";
  let total = 0;

  if(globalItems.length === 0){
      listDiv.innerHTML = "<div style='text-align:center; color:#94a3b8'>List is empty</div>";
      totalDiv.innerText = "₹0";
      return;
  }

  globalItems.forEach((it, i) => {
    if(it.status === "done") total += Number(it.price || 0);

    const div = document.createElement("div");
    div.className = "item-card " + it.status;

    // SVG Delete Icon
    const trashIcon = `<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`;

    div.innerHTML = `
      <div class="item-header">
        <span class="item-text">${i+1}. ${it.name}</span>
        <div class="status-wrap">
            ${it.status !== 'pending' ? `<span class="status-label ${it.status}">${it.status === 'done' ? '✔ Available' : '❌ N/A'}</span>` : ''}
            <span class="delete-icon" onclick="deleteItem(${i})">${trashIcon}</span>
        </div>
      </div>
      <input type="number" class="price-input" placeholder="Price ₹" value="${it.price || ''}"
        oninput="updatePrice(${i}, this.value)">
      
      ${it.status === "pending" ? `
        <div class="row">
          <button class="btn btn-avail" onclick="updateStatus(${i}, 'done')">✔ Available</button>
          <button class="btn btn-na" onclick="updateStatus(${i}, 'na')">❌ N/A</button>
        </div>
      ` : ''}
    `;
    listDiv.appendChild(div);
  });

  totalDiv.innerText = "₹" + total;
}

// 🔥 Update Price
window.updatePrice = function(i, val){
  globalItems[i].price = val;
  let total = 0;
  globalItems.forEach(it => { if(it.status === "done") total += Number(it.price || 0); });
  totalDiv.innerText = "₹" + total;
  scheduleSync();
}

// 🔥 Update Status
window.updateStatus = function(i, stat){
  globalItems[i].status = stat;
  sortItems(); // Re-sort immediately
  renderUI();
  scheduleSync();
}

// 🔥 Smart Cloud Sync (Handles Full List Deletion properly)
function scheduleSync(){
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => {
    if(uid){
      const ref = db.collection("users").doc(uid);
      
      if (currentCategory === "Full List") {
          // Smart Sync for Full List: Separate items back to their original categories
          let updates = {};
          let rootItems = [];
          let catGroups = {};

          globalItems.forEach(it => {
              // Strip out the internal _cat tag before saving to DB
              let cleanItem = { name: it.name, price: it.price, status: it.status };
              
              if(it._cat === 'root') {
                  rootItems.push(cleanItem);
              } else {
                  if(!catGroups[it._cat]) catGroups[it._cat] = [];
                  catGroups[it._cat].push(cleanItem);
              }
          });

          // Update root
          updates["items"] = rootItems;
          // Update categories
          Object.keys(catGroups).forEach(cat => {
              updates["categories." + cat + ".items"] = catGroups[cat];
          });

          ref.update(updates).catch(e => console.log("Merge Update failed, needs initial setup"));

      } else if (currentCategory && currentCategory !== "root") {
          // Standard Category Sync
          let obj = {};
          // Remove internal tag
          let cleanData = globalItems.map(it => ({ name: it.name, price: it.price, status: it.status }));
          obj["categories." + currentCategory + ".items"] = cleanData;
          ref.update(obj).catch(() => {
              let fallback = { categories: {} };
              fallback.categories[currentCategory] = { items: cleanData };
              ref.set(fallback, { merge: true });
          });
      } else {
          // Standard Root Sync
          let cleanData = globalItems.map(it => ({ name: it.name, price: it.price, status: it.status }));
          ref.update({ items: cleanData }).catch(() => {
              ref.set({ items: cleanData }, { merge: true });
          });
      }
    }
  }, 400);
}
</script>

</body>
</html>
