<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no">
  <title>Listo - Shared List</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0; font-family: system-ui;
      background: linear-gradient(-45deg, #f8fafc, #edf2f7, #e2e8f0, #e0f2fe);
      background-size: 400% 400%; animation: liveBg 8s ease-in-out infinite;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; box-sizing: border-box; min-height: 100vh;
      transition: background 0.3s ease;
    }
    @keyframes liveBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .theme-toggle {
      position: absolute; top: 20px; right: 20px; background: white; border: 1px solid #cbd5e1;
      border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.3s ease; display: flex;
      justify-content: center; align-items: center; z-index: 100;
    }

    .logo { width: 100px; height: auto; object-fit: contain; margin-top: 10px; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    .container { width: 100%; max-width: 420px; margin-bottom: 20px; }
    
    .card {
      width: 100%; background: white; border-radius: 24px; padding: 20px;
      box-sizing: border-box; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); border: 1px solid #f1f5f9;
    }

    .title { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 10px; color: #1e293b; transition: color 0.3s; }
    .cat-name { text-align: center; font-size: 14px; font-weight: 600; color: #6366f1; background: #eef2ff; padding: 4px 12px; border-radius: 20px; width: fit-content; margin: 0 auto 20px; }
    
    .item-card { background: #f8fafc; border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
    .item-text { font-size: 16px; font-weight: bold; color: #334155; }

    .loading-text { text-align: center; color: #64748b; font-style: italic; padding: 20px 0; }
    .tagline { width: 100%; text-align: center; font-style: italic; color: #16a34a; font-weight: 600; margin-top: 15px; font-size: 13px; }

    /* DARK MODE */
    body.dark-mode { background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #334155); }
    body.dark-mode .card { background: #1e293b; border-color: #334155; }
    body.dark-mode .title { color: #f8fafc; }
    body.dark-mode .cat-name { background: #312e81; color: #a5b4fc; }
    body.dark-mode .item-card { background: #0f172a; border-color: #334155; }
    body.dark-mode .item-text { color: #f1f5f9; }
  </style>
</head>

<body>
  <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">🌙</button>

  <img src="https://image2url.com/r2/default/images/1774860458918-c6f7a05c-ca26-46e6-96fc-a7648f576bb0.png" class="logo" onerror="this.src='https://i.ibb.co/8nH5RSsc/Listo.png';" alt="Listo Logo">

  <div class="container">
    <div class="card">
      <div class="title">Shared List</div>
      <div id="catDisplay" class="cat-name" style="display:none;"></div>
      <div id="list"><div class="loading-text">Scanning list...</div></div>
    </div>
    <div class="tagline">Listo apnaiye: List banegi digital, shopping hogi simple!</div>
  </div>

  <script>
    let params = new URLSearchParams(location.search);
    let dataParam = params.get("data");

    // Theme Logic
    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      const isDark = document.body.classList.contains('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      document.getElementById('themeToggle').innerText = isDark ? '☀️' : '🌙';
    }

    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
      document.getElementById('themeToggle').innerText = '☀️';
    }

    const listDiv = document.getElementById("list");
    const catDiv = document.getElementById("catDisplay");

    if (dataParam) {
      try {
        const decodedData = decodeURIComponent(dataParam);
        let lines = decodedData.split('\n');
        let html = '';

        // Category Check (LISTO CategoryName:)
        if (lines[0].startsWith("LISTO")) {
          const header = lines[0].split(':');
          const catName = header[0].replace("LISTO", "").trim();
          if(catName) {
            catDiv.innerText = catName;
            catDiv.style.display = 'block';
          }
          lines.shift(); // Remove header line
        }

        const items = lines.filter(l => l.trim() !== "");

        if (items.length > 0) {
          items.forEach((it) => {
            // Remove leading numbers if present in string (e.g. "1. Sabji" -> "Sabji")
            const cleanText = it.replace(/^\d+\.\s*/, '');
            html += `<div class="item-card"><div class="item-text">• ${cleanText}</div></div>`;
          });
          listDiv.innerHTML = html;
        } else {
          listDiv.innerHTML = `<div class="loading-text">List is empty!</div>`;
        }
      } catch (e) {
        listDiv.innerHTML = `<div class="loading-text">Error reading QR data.</div>`;
      }
    } else {
      listDiv.innerHTML = `<div class="loading-text">No data found. Please scan again.</div>`;
    }
  </script>
</body>
</html>
