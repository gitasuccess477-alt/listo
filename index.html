<!DOCTYPE html>

<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no">
  <title>Listo - Shared List</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    /* 🔥 UI SAME — NO CHANGE */
    body {
      margin: 0; font-family: system-ui;
      background: linear-gradient(-45deg, #f8fafc, #edf2f7, #e2e8f0, #e0f2fe);
      background-size: 400% 400%; animation: liveBg 8s ease-in-out infinite;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; box-sizing: border-box; min-height: 100vh;
    }
    @keyframes liveBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .logo { width: 100px; margin: 10px auto; }
    .container { width: 100%; max-width: 420px; }

    .card {
      background: white; border-radius: 20px; padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .title { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 10px; }

    .cat-badge {
      text-align: center; font-size: 13px; font-weight: 600;
      color: #6366f1; background: #eef2ff;
      padding: 4px 15px; border-radius: 20px;
      width: fit-content; margin: 0 auto 15px; display: none;
    }

    .item-card {
      background: #f8fafc; border-radius: 12px; padding: 15px;
      margin-bottom: 12px; border: 1px solid #e2e8f0;
    }

    .item-card.done { background: #dcfce7; }
    .item-card.na { background: #fee2e2; }

    .price-input {
      width: 100%; padding: 10px; border-radius: 10px;
      border: 1px solid #cbd5e1; margin-top: 8px;
    }

    .btn { padding: 10px; border: none; border-radius: 10px; color: white; cursor: pointer; }
    .btn-avail { background: #22c55e; }
    .btn-na { background: #ef4444; }
  </style>

</head>

<body>

<img src="https://image2url.com/r2/default/images/1774860458918-c6f7a05c-ca26-46e6-96fc-a7648f576bb0.png" class="logo">

<div class="container">
  <div class="card">
    <div class="title">Shared List</div>
    <div id="catName" class="cat-badge"></div>
    <div id="list">Loading...</div>
    <h2 id="totalDisplay">₹0</h2>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "listo-356ba.firebaseapp.com",
  projectId: "listo-356ba"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const uid = params.get("uid");
const dataParam = params.get("data");

let globalItems = [];
let qrMode = false;
let currentCategory = "";

const listDiv = document.getElementById("list");
const totalDiv = document.getElementById("totalDisplay");
const catDiv = document.getElementById("catName");


// ✅ QR LOAD FIX
if (dataParam) {
    const decoded = decodeURIComponent(dataParam);
    let lines = decoded.split('\n').filter(l => l.trim());

    let items = [];

    lines.forEach(line => {
        if (line.toUpperCase().includes("LISTO")) {
            currentCategory = line.replace(/LISTO/i, "").replace(":", "").trim();
            catDiv.innerText = currentCategory;
            catDiv.style.display = "block";
        } else {
            items.push({ name: line.replace(/^\d+[\.\)]\s*/, ""), price:"", status:"pending" });
        }
    });

    globalItems = items;
    qrMode = true; // 🔒 LOCK
    renderUI();
}


// ✅ FIREBASE SYNC FIX
if (uid) {
    db.collection("users").doc(uid).onSnapshot(doc => {
        if (!doc.exists) return;

        const data = doc.data();
        let cloudItems = [];

        if (currentCategory && data.categories && data.categories[currentCategory]) {
            cloudItems = data.categories[currentCategory].items || [];
        } else {
            cloudItems = data.items || [];
        }

        if (qrMode && globalItems.length > 0) return; // 🔒 prevent overwrite

        globalItems = cloudItems;
        renderUI();
    });
}


// ✅ UI
function renderUI(){
    listDiv.innerHTML = "";
    let total = 0;

    globalItems.forEach((it,i)=>{
        if(it.status==="done") total += Number(it.price||0);

        let div = document.createElement("div");
        div.className = "item-card " + it.status;

        div.innerHTML = `
        <b>${i+1}. ${it.name}</b>
        <input type="number" class="price-input" value="${it.price||''}"
            oninput="updateItem(${i},'price',this.value)">
        <br><br>
        <button class="btn btn-avail" onclick="updateItem(${i},'status','done')">✔ Available</button>
        <button class="btn btn-na" onclick="updateItem(${i},'status','na')">❌ N/A</button>
        `;

        listDiv.appendChild(div);
    });

    totalDiv.innerText = "₹" + total;
}


// ✅ UPDATE + DUAL SYNC FIX
function updateItem(i,field,val){
    globalItems[i][field] = val;

    if(uid){
        let updateData = {};

        if(currentCategory){
            updateData[`categories.${currentCategory}.items`] = globalItems;
        }else{
            updateData["items"] = globalItems;
        }

        db.collection("users").doc(uid).set(updateData,{merge:true});
    }

    renderUI();
}
</script>

</body>
</html>
