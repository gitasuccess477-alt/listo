<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Listo - Shared List</title>

<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<style>
  body {
    margin: 0; font-family: system-ui;
    background: linear-gradient(-45deg, #f8fafc, #edf2f7, #e2e8f0, #e0f2fe);
    background-size: 400% 400%; animation: liveBg 8s ease-in-out infinite;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px; box-sizing: border-box; min-height: 100vh;
    transition: background 0.3s ease;
  }
  @keyframes liveBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

  .theme-toggle {
    position: absolute; top: 20px; right: 20px; background: white; border: 1px solid #cbd5e1;
    border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; justify-content: center; align-items: center; z-index: 100; transition: 0.3s;
  }

  .logo { width: 100px; height: auto; margin-top: 10px; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

  .container { max-width: 420px; width: 100%; margin-bottom: 20px; }

  .card {
    background: white; color: #1e293b; padding: 20px; border-radius: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: all 0.3s ease; position: relative;
  }

  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
  .balance-box { text-align: left; }
  .balance-lbl { margin: 0; font-size: 11px; color: #16a34a; font-weight: bold; text-transform: uppercase; }
  .balance-val { margin: 0; font-size: 18px; font-weight: 800; color: #1e293b; transition: color 0.3s; }
  .title { margin: 0; font-size: 22px; font-weight: bold; color: #1e293b; transition: color 0.3s; }

  .cat-badge {
    text-align: center; font-size: 13px; font-weight: 600; color: #6366f1;
    background: #eef2ff; padding: 4px 15px; border-radius: 20px; width: fit-content;
    margin: 0 auto 15px; display: none;
  }

  .item-card {
    background: #f1f5f9; padding: 15px; border-radius: 12px; margin-bottom: 12px;
    border: 1px solid #e2e8f0; box-sizing: border-box; width: 100%; transition: all 0.3s ease;
  }
  .item-card.done { background: #dcfce7; border-color: #bbf7d0; }
  .item-card.na { background: #fee2e2; border-color: #fecaca; }

  .item-text { font-size: 16px; font-weight: bold; margin-bottom: 8px; display: block; color: #334155; transition: color 0.3s; }
  .status-label { font-size: 11px; font-weight: bold; text-transform: uppercase; margin-top: 8px; display: block; }
  .status-label.done { color: #16a34a; }
  .status-label.na { color: #dc2626; }

  .price-input {
    width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1;
    background: white; color: #1e293b; margin-bottom: 8px; box-sizing: border-box; outline: none; font-size: 14px; transition: all 0.3s ease;
  }

  .row { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 10px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; transition: 0.1s; }
  .btn:active { transform: scale(0.95); }
  .btn-avail { background: #22c55e; }
  .btn-na { background: #ef4444; }

  .tagline { text-align: center; font-size: 13px; color: #16a34a; font-weight: 600; font-style: italic; margin-top: 15px; }

  /* 🔥 PURANA DARK MODE WAPAS 🔥 */
  body.dark-mode { background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #334155); }
  body.dark-mode .theme-toggle { background: #334155; border-color: #475569; }
  body.dark-mode .card { background: #1e293b; border-color: #334155; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); }
  body.dark-mode .title, body.dark-mode .balance-val { color: #f8fafc; }
  body.dark-mode .item-card { background: #0f172a; border-color: #334155; }
  body.dark-mode .item-text { color: #f1f5f9; }
  body.dark-mode .price-input { background: #1e293b; color: #f8fafc; border-color: #475569; }
  body.dark-mode .cat-badge { background: #312e81; color: #a5b4fc; }
  body.dark-mode .tagline { color: #4ade80; }
</style>
</head>

<body>

<button id="themeToggle" class="toggle" onclick="toggleTheme()">🌙</button>

<img src="https://image2url.com/r2/default/images/1774860458918-c6f7a05c-ca26-46e6-96fc-a7648f576bb0.png" class="logo">

<div class="container">
  <div class="card">
    <div class="header-top">
      <div class="balance-box">
        <p class="balance-lbl">Balance</p>
        <h3 id="totalDisplay" class="balance-val">₹0</h3>
      </div>
      <h2 class="title">Shared List</h2>
    </div>
    
    <div id="catName" class="cat-badge"></div>
    <div id="list" style="text-align:center; color:#94a3b8; font-style:italic; padding:20px;">Scanning...</div>
  </div>
  <p class="tagline">Listo apnaiye: List banegi digital, shopping hogi simple!</p>
</div>

<script>
// 🔥 Firebase Init
const firebaseConfig = {
  apiKey: "AIzaSyBbBsz8FgD6_5WKbCvfqtEkPLa9q_PIhuA",
  authDomain: "listo-356ba.firebaseapp.com",
  projectId: "listo-356ba",
  storageBucket: "listo-356ba.firebasestorage.app",
  messagingSenderId: "104729909475",
  appId: "1:104729909475:web:fb3bd44800d371b7748dd6"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 Params
const params = new URLSearchParams(location.search);
const uid = params.get("uid");
const data = params.get("data");
const appTheme = params.get("theme");

let globalItems = [];
let currentCategory = "";
let syncTimeout;

const listDiv = document.getElementById("list");
const totalDiv = document.getElementById("totalDisplay");
const catDiv = document.getElementById("catName");
const themeBtn = document.getElementById("themeToggle");

// 🔥 Purana Theme System Wapas
function toggleTheme(){
  document.body.classList.toggle("dark-mode");
  const isDark = document.body.classList.contains("dark-mode");
  localStorage.setItem("theme", isDark);
  themeBtn.innerText = isDark ? "☀️" : "🌙";
}
if(appTheme === "dark" || localStorage.getItem("theme") === "true") {
    document.body.classList.add("dark-mode");
    themeBtn.innerText = "☀️";
}

// 🔥 QR Parse + Real Category Identification Fix
if(data){
  try {
    const decoded = decodeURIComponent(data);
    let lines = decoded.split('\n').map(l => l.trim()).filter(l => l !== "");
    let tempItems = [];

    lines.forEach(line => {
        if (line.toUpperCase().includes("LISTO")) {
            let catRawName = line.replace(/LISTO/i, "").replace(/:$/, "").trim();
            
            // 🔥 CRITICAL SYNC FIX: App ke Root Data ko Pehchano
            if(catRawName === "Show Item" || catRawName === "Full List"){
                currentCategory = ""; // Firebase ke root "items" me sync hoga
            } else {
                currentCategory = catRawName;
            }

            if(catRawName) {
                catDiv.innerText = catRawName;
                catDiv.style.display = "block";
            }
        } else {
            tempItems.push({
                name: line.replace(/^\d+[\.\)]\s*/, ""),
                price: "",
                status: "pending"
            });
        }
    });
    globalItems = tempItems;
    renderUI();
  } catch(e) {
    listDiv.innerHTML = "Error parsing QR";
  }
}

// 🔥 Firestore Dual Sync
if(uid){
  db.collection("users").doc(uid).onSnapshot(doc => {
    if(doc.exists){
      // Agar web par type kar rahe hain toh UI wapas disturb nahi hoga
      if (doc.metadata.hasPendingWrites) return;

      const dataObj = doc.data();
      if (currentCategory && dataObj.categories && dataObj.categories[currentCategory]) {
          // Category data
          globalItems = dataObj.categories[currentCategory].items || [];
      } else {
          // Root data (Bina category wale items)
          globalItems = dataObj.items || [];
      }
      renderUI();
    }
  });
}

// 🔥 Render UI
function renderUI(){
  listDiv.innerHTML = "";
  let total = 0;

  if(globalItems.length === 0){
      listDiv.innerHTML = "<div style='text-align:center; color:#94a3b8'>List is empty</div>";
      totalDiv.innerText = "₹0";
      return;
  }

  globalItems.forEach((it, i) => {
    if(it.status === "done") total += Number(it.price || 0);

    const div = document.createElement("div");
    div.className = "item-card " + it.status;

    div.innerHTML = `
      <span class="item-text">${i+1}. ${it.name}</span>
      <input type="number" class="price-input" placeholder="Price ₹" value="${it.price || ''}"
        oninput="updatePrice(${i}, this.value)">
      
      ${it.status === "pending" ? `
        <div class="row">
          <button class="btn btn-avail" onclick="updateStatus(${i}, 'done')">✔ Available</button>
          <button class="btn btn-na" onclick="updateStatus(${i}, 'na')">❌ N/A</button>
        </div>
      ` : `
        <span class="status-label ${it.status}">${it.status === 'done' ? '✔ Available' : '❌ N/A'}</span>
      `}
    `;
    listDiv.appendChild(div);
  });

  totalDiv.innerText = "₹" + total;
}

// 🔥 Update Price Without Resetting UI
function updatePrice(i, val){
  globalItems[i].price = val;
  let total = 0;
  globalItems.forEach(it => { if(it.status === "done") total += Number(it.price || 0); });
  totalDiv.innerText = "₹" + total;
  scheduleSync();
}

// 🔥 Update Status
function updateStatus(i, stat){
  globalItems[i].status = stat;
  renderUI();
  scheduleSync();
}

// 🔥 Cloud Sync Fire
function scheduleSync(){
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(() => {
    if(uid){
      const ref = db.collection("users").doc(uid);
      if (currentCategory) {
          let obj = {};
          obj["categories." + currentCategory + ".items"] = globalItems;
          ref.update(obj).catch(() => {
              let fallback = { categories: {} };
              fallback.categories[currentCategory] = { items: globalItems };
              ref.set(fallback, { merge: true });
          });
      } else {
          // Root Sync
          ref.update({ items: globalItems }).catch(() => {
              ref.set({ items: globalItems }, { merge: true });
          });
      }
    }
  }, 400);
}
</script>

</body>
</html>
