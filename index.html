<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no">
  <title>Listo - Shared List</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0; font-family: system-ui;
      background: linear-gradient(-45deg, #f8fafc, #edf2f7, #e2e8f0, #e0f2fe);
      background-size: 400% 400%; animation: liveBg 8s ease-in-out infinite;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; box-sizing: border-box; min-height: 100vh;
      transition: background 0.3s ease;
    }
    @keyframes liveBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .theme-toggle {
      position: absolute; top: 20px; right: 20px; background: white; border: 1px solid #cbd5e1;
      border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.3s ease; display: flex;
      justify-content: center; align-items: center; z-index: 100;
    }

    .logo { width: 100px; height: auto; object-fit: contain; margin-top: 10px; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    .container { width: 100%; max-width: 420px; margin-bottom: 20px; }
    
    .card {
      width: 100%; background: white; border-radius: 20px; padding: 20px;
      box-sizing: border-box; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); border: 1px solid #f1f5f9;
      transition: all 0.3s ease; position: relative;
    }

    .header-balance { position: absolute; top: 22px; left: 20px; text-align: left; }
    .bal-label { color: #16a34a; font-weight: bold; font-size: 10px; margin: 0; text-transform: uppercase; }
    .bal-amt { color: #1e293b; font-weight: 800; font-size: 16px; margin: 0; }

    .title { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #1e293b; display: flex; justify-content: center; align-items: center; gap: 10px; }
    .live-badge { background-color: #ef4444; color: white; font-size: 9px; padding: 2px 8px; border-radius: 12px; animation: pulse 1.5s infinite; text-transform: uppercase; font-weight: 900; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    .cat-badge { text-align: center; font-size: 13px; font-weight: 600; color: #6366f1; background: #eef2ff; padding: 4px 15px; border-radius: 20px; width: fit-content; margin: 0 auto 15px; }

    .item-card { background: #f8fafc; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
    .item-card.done { background: #dcfce7; border-color: #bbf7d0; }
    .item-card.na { background: #fee2e2; border-color: #fecaca; }

    .item-header { display: flex; justify-content: space-between; align-items: center; }
    .item-text { font-size: 16px; font-weight: bold; color: #334155; flex: 1; }
    .item-status-text { font-size: 10px; font-weight: 900; text-transform: uppercase; color: #16a34a; }
    .item-card.na .item-status-text { color: #dc2626; }

    .price-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; outline: none; background: white; box-sizing: border-box; transition: all 0.3s ease; }
    
    .action-buttons { display: flex; gap: 8px; margin-top: 5px; }
    .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 13px; cursor: pointer; transition: transform 0.1s; }
    .btn-avail { background: #22c55e; }
    .btn-na { background: #ef4444; }

    .loading-text { text-align: center; color: #64748b; font-style: italic; padding: 20px 0; }
    .tagline { width: 100%; text-align: center; font-style: italic; color: #16a34a; font-weight: 600; margin-top: 15px; font-size: 13px; }

    body.dark-mode { background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #334155); }
    body.dark-mode .theme-toggle { background: #334155; border-color: #475569; }
    body.dark-mode .card { background: #1e293b; border-color: #334155; }
    body.dark-mode .title, body.dark-mode .bal-amt { color: #f8fafc; }
    body.dark-mode .item-card { background: #0f172a; border-color: #334155; }
    body.dark-mode .item-text { color: #f1f5f9; }
    body.dark-mode .price-input { background: #1e293b; color: #f8fafc; border-color: #475569; }
    body.dark-mode .cat-badge { background: #312e81; color: #a5b4fc; }
  </style>
</head>

<body>

  <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">🌙</button>

  <img src="https://image2url.com/r2/default/images/1774860458918-c6f7a05c-ca26-46e6-96fc-a7648f576bb0.png" class="logo" alt="Listo Logo">

  <div class="container">
    <div class="card">
      <div class="header-balance">
        <p class="bal-label">Balance</p>
        <p id="totalDisplay" class="bal-amt">₹0</p>
      </div>

      <div class="title" id="mainTitle">Shared List</div>
      <div id="catName" class="cat-badge" style="display:none;"></div>
      <div id="list"><div class="loading-text">Loading items...</div></div>
    </div>
    <div class="tagline">Listo apnaiye: List banegi digital, shopping hogi simple!</div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBbBsz8FgD6_5WKbCvfqtEkPLa9q_PIhuA",
      authDomain: "listo-356ba.firebaseapp.com",
      projectId: "listo-356ba",
      storageBucket: "listo-356ba.firebasestorage.app",
      messagingSenderId: "104729909475",
      appId: "1:104729909475:web:fb3bd44800d371b7748dd6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let params = new URLSearchParams(location.search);
    let uid = params.get("uid");
    let dataParam = params.get("data");
    let appTheme = params.get("theme");

    let globalItems = [];
    const listDiv = document.getElementById("list");
    const totalDiv = document.getElementById("totalDisplay");
    const catDisplay = document.getElementById("catName");

    // ORIGINAL Theme Logic
    const themeBtn = document.getElementById('themeToggle');
    if (appTheme === 'dark' || localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        themeBtn.innerText = '☀️';
    }

    function toggleTheme() {
      const isDark = document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
      themeBtn.innerText = isDark ? '☀️' : '🌙';
    }

    // MAIN DATA LOGIC
    if (uid) {
      document.getElementById("mainTitle").innerHTML = `Shared List <span class="live-badge">Live</span>`;
      db.collection("users").doc(uid).onSnapshot((doc) => {
        if (doc.exists) {
          globalItems = doc.data().items || [];
          renderUI();
        }
      });
    } else if (dataParam) {
      try {
        const decoded = decodeURIComponent(dataParam);
        // Step 1: Har line ko alag karo
        let rawLines = decoded.split(/\r?\n/);
        let itemsToRender = [];

        rawLines.forEach(line => {
            let trimmed = line.trim();
            if(!trimmed) return;

            // Step 2: Check if line is a Category Header (LISTO Category:)
            if (trimmed.toUpperCase().startsWith("LISTO")) {
                let catPart = trimmed.split(':')[0]; // "LISTO Groceries"
                let catName = catPart.replace(/LISTO/i, "").trim();
                if(catName) {
                    catDisplay.innerText = catName;
                    catDisplay.style.display = "block";
                }
            } else {
                // Step 3: It's a normal item, clean numbering
                let cleanName = trimmed.replace(/^\d+[\.\)]\s*/, '');
                itemsToRender.push({
                    name: cleanName,
                    price: "",
                    status: "pending"
                });
            }
        });

        globalItems = itemsToRender;
        renderUI();
      } catch (e) {
        listDiv.innerHTML = "<div class='loading-text'>Data Error</div>";
      }
    }

    function renderUI() {
      listDiv.innerHTML = "";
      let totalSpent = 0;

      globalItems.forEach((it, idx) => {
        if (it.status === "done") totalSpent += parseFloat(it.price || 0);

        let div = document.createElement("div");
        div.className = `item-card ${it.status}`;
        let statusTag = it.status === 'done' ? 'Available' : (it.status === 'na' ? 'N/A' : '');

        div.innerHTML = `
          <div class="item-header">
            <span class="item-text">${idx + 1}. ${it.name}</span>
            <span class="item-status-text">${statusTag}</span>
          </div>
          <input type="number" class="price-input" placeholder="Price ₹" value="${it.price || ''}" oninput="updatePrice(${idx}, this.value)">
          ${it.status === 'pending' ? `
            <div class="action-buttons">
              <button class="btn btn-avail" onclick="updateStat(${idx}, 'done')">Available</button>
              <button class="btn btn-na" onclick="updateStat(${idx}, 'na')">N/A</button>
            </div>
          ` : ''}
        `;
        listDiv.appendChild(div);
      });
      totalDiv.innerText = `₹${totalSpent}`;
    }

    function updatePrice(idx, val) {
        globalItems[idx].price = val;
        sync();
    }

    function updateStat(idx, stat) {
        globalItems[idx].status = stat;
        sync();
    }

    function sync() {
        if (uid) {
            db.collection("users").doc(uid).set({ items: globalItems }, { merge: true });
        } else {
            renderUI();
        }
    }
  </script>
</body>
</html>
