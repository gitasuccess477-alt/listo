<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no">
  <title>Listo - Shared List</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0; font-family: system-ui;
      background: linear-gradient(-45deg, #f8fafc, #edf2f7, #e2e8f0, #e0f2fe);
      background-size: 400% 400%; animation: liveBg 8s ease-in-out infinite;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; box-sizing: border-box; min-height: 100vh;
    }

    @keyframes liveBg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      width: 100%; max-width: 420px;
      background: white; border-radius: 20px; padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .title {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .cat {
      text-align: center;
      background: #eef2ff;
      padding: 5px 15px;
      border-radius: 20px;
      margin-bottom: 15px;
      font-weight: bold;
      color: #4f46e5;
      display: none;
    }

    .item {
      background: #f8fafc;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      border: 1px solid #e2e8f0;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    button {
      margin-top: 5px;
      padding: 8px;
      width: 48%;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="title">Shared List</div>
  <div id="cat" class="cat"></div>
  <div id="list">Loading...</div>
  <h3 id="total">₹0</h3>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "listo-356ba.firebaseapp.com",
  projectId: "listo-356ba"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const uid = params.get("uid");
const dataParam = params.get("data");

let items = [];
const listDiv = document.getElementById("list");
const catDiv = document.getElementById("cat");
const totalDiv = document.getElementById("total");


// =====================
// 🔥 QR PARSE FIX
// =====================
if (dataParam) {
  const decoded = decodeURIComponent(dataParam);

  let lines = decoded.split("\n")
    .map(l => l.trim())
    .filter(l => l !== "");

  let finalItems = [];

  lines.forEach(line => {

    // ✅ CATEGORY DETECT (FIXED)
    if (line.includes(":")) {
      let name = line.replace(":", "").trim();

      if (name) {
        catDiv.innerText = name;
        catDiv.style.display = "block";
      }

    } else {

      // ✅ ITEM CLEAN
      let cleanItem = line.replace(/^\d+[\.\)]\s*/, "");

      finalItems.push({
        name: cleanItem,
        price: "",
        status: "pending"
      });
    }

  });

  items = finalItems;
  render();

}


// =====================
// 🔥 FIREBASE LIVE
// =====================
if (uid) {
  db.collection("users").doc(uid)
    .onSnapshot(doc => {
      if (doc.exists) {
        items = doc.data().items || [];
        render();
      }
    });
}


// =====================
// 🔥 UI RENDER
// =====================
function render() {

  listDiv.innerHTML = "";
  let total = 0;

  items.forEach((it, i) => {

    if (it.status === "done") {
      total += Number(it.price || 0);
    }

    const div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
      <b>${i+1}. ${it.name}</b><br>

      <input type="number" placeholder="Price"
        value="${it.price || ''}"
        oninput="update(${i}, 'price', this.value)">

      ${
        it.status === "pending"
        ? `
        <button onclick="update(${i}, 'status', 'done')">✔</button>
        <button onclick="update(${i}, 'status', 'na')">❌</button>
        `
        : `<small>${it.status}</small>`
      }
    `;

    listDiv.appendChild(div);
  });

  totalDiv.innerText = "₹" + total;
}


// =====================
// 🔥 UPDATE
// =====================
function update(i, field, val) {

  items[i][field] = val;

  if (uid) {
    db.collection("users").doc(uid)
      .set({ items: items }, { merge: true });
  } else {
    render();
  }

}
</script>

</body>
</html>
