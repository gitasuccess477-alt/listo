<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no">
  <title>Listo - Shared List</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0; font-family: system-ui;
      background: linear-gradient(-45deg, #f8fafc, #edf2f7, #e2e8f0, #e0f2fe);
      background-size: 400% 400%; animation: liveBg 8s ease-in-out infinite;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; box-sizing: border-box; min-height: 100vh;
    }

    @keyframes liveBg {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .theme-toggle {
      position: absolute; top: 20px; right: 20px;
      background: white; border: 1px solid #cbd5e1;
      border-radius: 50%; width: 40px; height: 40px;
      font-size: 18px; cursor: pointer;
    }

    .logo {
      width: 100px; margin: 10px 0 15px;
    }

    .container {
      width: 100%; max-width: 420px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .title {
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .cat-badge {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #6366f1;
      background: #eef2ff;
      padding: 4px 15px;
      border-radius: 20px;
      margin-bottom: 15px;
      display: none;
    }

    .item-card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      border: 1px solid #e2e8f0;
    }

    .item-card.done {
      background: #dcfce7;
    }

    .item-card.na {
      background: #fee2e2;
    }

    .item-text {
      font-size: 16px;
      font-weight: bold;
    }

    .price-input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
    }

    .btn {
      padding: 8px;
      margin-top: 5px;
      width: 48%;
    }

    .balance {
      font-weight: bold;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

<button id="themeToggle" class="theme-toggle">🌙</button>

<img src="https://image2url.com/r2/default/images/1774860458918-c6f7a05c-ca26-46e6-96fc-a7648f576bb0.png" class="logo">

<div class="container">
  <div class="card">

    <div class="balance">Balance: <span id="totalDisplay">₹0</span></div>

    <div class="title">Shared List</div>

    <div id="catName" class="cat-badge"></div>

    <div id="list">Loading...</div>

  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "listo-356ba.firebaseapp.com",
  projectId: "listo-356ba"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const params = new URLSearchParams(location.search);
const uid = params.get("uid");
const dataParam = params.get("data");

let globalItems = [];
let isQRMode = false;

const listDiv = document.getElementById("list");
const totalDiv = document.getElementById("totalDisplay");
const catDiv = document.getElementById("catName");


// ================= QR MODE =================
if (dataParam) {
  isQRMode = true;

  try {
    const decoded = decodeURIComponent(dataParam);

    let lines = decoded.split('\n')
      .map(l => l.trim())
      .filter(l => l !== "");

    let finalItems = [];

    lines.forEach(line => {

      if (line.includes(":")) {
        let name = line.replace(":", "").trim();

        if (name) {
          catDiv.innerText = name;
          catDiv.style.display = "block";
        }

      } else {
        let cleanItem = line.replace(/^\d+[\.\)]\s*/, "");

        finalItems.push({
          name: cleanItem,
          price: "",
          status: "pending"
        });
      }

    });

    globalItems = finalItems;
    renderUI();

  } catch (e) {
    listDiv.innerHTML = "QR Error";
  }
}


// ================= FIREBASE =================
if (uid && !isQRMode) {
  db.collection("users").doc(uid)
    .onSnapshot(doc => {
      if (doc.exists) {
        globalItems = doc.data().items || [];
        renderUI();
      }
    });
}


// ================= RENDER =================
function renderUI() {

  listDiv.innerHTML = "";
  let total = 0;

  globalItems.forEach((it, i) => {

    if (it.status === "done") {
      total += Number(it.price || 0);
    }

    const div = document.createElement("div");
    div.className = "item-card " + it.status;

    div.innerHTML = `
      <div class="item-text">${i+1}. ${it.name}</div>

      <input type="number"
        class="price-input"
        placeholder="Price ₹"
        value="${it.price || ''}"
        oninput="updateItem(${i}, 'price', this.value)">

      ${
        it.status === "pending"
        ? `
        <button class="btn" onclick="updateItem(${i}, 'status', 'done')">✔ Available</button>
        <button class="btn" onclick="updateItem(${i}, 'status', 'na')">❌ N/A</button>
        `
        : `<small>${it.status}</small>`
      }
    `;

    listDiv.appendChild(div);
  });

  totalDiv.innerText = "₹" + total;
}


// ================= UPDATE =================
function updateItem(i, field, val) {

  globalItems[i][field] = val;

  if (uid && !isQRMode) {
    db.collection("users").doc(uid)
      .set({ items: globalItems }, { merge: true });
  } else {
    renderUI();
  }

}
</script>

</body>
</html>
