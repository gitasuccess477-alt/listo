<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1,
maximum-scale=1,user-scalable=no">

<title>Item List</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#ffffff;

display:flex;
flex-direction:column;
align-items:center;

padding:20px;
box-sizing:border-box;
}

/* LOGO */

.logo{
width:85px;
margin-top:10px;
margin-bottom:10px;
}

/* CONTAINER */

.container{
width:100%;
max-width:400px;
}

/* 3D CARD */

.card{

width:100%;

background:white;

border-radius:20px;

padding:22px;

box-sizing:border-box;

/* 3D SHADOW */

box-shadow:
0 8px 18px rgba(0,0,0,0.15),
0 2px 6px rgba(0,0,0,0.1);

border:1px solid #eee;

}

/* TITLE */

.title{
text-align:center;
font-size:20px;
font-weight:bold;
margin-bottom:15px;
}

/* ITEMS */

.item{
display:flex;
align-items:center;
gap:10px;

padding:8px 0;

font-size:16px;

border-bottom:1px solid #f1f1f1;
}

.item:last-child{
border-bottom:none;
}

/* CHECKBOX */

.item input{
width:18px;
height:18px;
}

/* TAGLINE */

.tagline{
position:fixed;
bottom:15px;
left:0;
width:100%;
text-align:center;

font-style:italic;
color:#16a34a;
font-size:14px;
}
</style>

</head>

<body>

<img src="https://i.ibb.co/8nH5RSsc/Listo.png" class="logo">

<div class="container">

<div class="card">

<div class="title">
Item List
</div>

<div id="list"></div>

</div>

<div class="tagline">
Paper ki list chhodo, digital bano – smart shopping karo aur environment bachao.
</div>

</div>

<script>

/* GET DATA FROM QR */

let params = new URLSearchParams(location.search)

let data = params.get("data")

if(data){

let items = decodeURIComponent(data).split("\n")

items.forEach(it=>{

if(it.trim()!=""){

let div=document.createElement("div")

div.className="item"

div.innerHTML=
`
<input type="checkbox">
<span>${it}</span>
`

document.getElementById("list").appendChild(div)

}

})

}

</script>

</body>
</html>
