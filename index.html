<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no">
  <title>Listo - Shared List</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0; font-family: system-ui;
      background: linear-gradient(-45deg, #f8fafc, #edf2f7, #e2e8f0, #e0f2fe);
      background-size: 400% 400%; animation: liveBg 8s ease-in-out infinite;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; box-sizing: border-box; min-height: 100vh;
    }
    @keyframes liveBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    .theme-toggle { position: absolute; top: 20px; right: 20px; background: white; border: 1px solid #cbd5e1; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; z-index: 100; }
    
    .logo { width: 80px; margin-bottom: 10px; }
    .container { width: 100%; max-width: 420px; }
    
    .card { width: 100%; background: white; border-radius: 24px; padding: 20px; box-sizing: border-box; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

    .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
    .balance-box { text-align: left; }
    .balance-label { color: #16a34a; font-weight: bold; font-size: 14px; margin: 0; }
    .total-val { color: #1e293b; font-weight: 800; font-size: 16px; margin: 0; }
    
    .title { font-size: 20px; font-weight: bold; color: #1e293b; margin: 0; }

    .cat-name { text-align: center; font-size: 13px; font-weight: 600; color: #6366f1; background: #eef2ff; padding: 4px 12px; border-radius: 20px; width: fit-content; margin: 0 auto 15px; }

    .item-card { background: #f8fafc; border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid #e2e8f0; display: flex; flex-direction: column; gap: 10px; }
    .item-card.done { background: #dcfce7; border-color: #bbf7d0; }
    .item-card.na { background: #fee2e2; border-color: #fecaca; }

    .item-header { display: flex; justify-content: space-between; align-items: center; }
    .item-text { font-size: 16px; font-weight: bold; color: #334155; }
    .status-badge { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #64748b; }

    .price-input { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid #cbd5e1; outline: none; box-sizing: border-box; }
    
    .btn-group { display: flex; gap: 8px; }
    .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
    .btn-avail { background: #22c55e; }
    .btn-na { background: #ef4444; }

    .tagline { margin-top: 20px; font-style: italic; color: #16a34a; font-weight: 600; font-size: 12px; text-align: center; }

    /* DARK MODE */
    body.dark-mode { background: #0f172a; }
    body.dark-mode .card { background: #1e293b; border-color: #334155; }
    body.dark-mode .title, body.dark-mode .total-val { color: #f8fafc; }
    body.dark-mode .item-card { background: #0f172a; border-color: #334155; }
    body.dark-mode .item-text { color: #f1f5f9; }
    body.dark-mode .price-input { background: #334155; border-color: #475569; color: white; }
  </style>
</head>

<body class="light-mode">
  <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">🌙</button>
  <img src="https://i.ibb.co/8nH5RSsc/Listo.png" class="logo" alt="Listo Logo">

  <div class="container">
    <div class="card">
      <div class="header-box">
        <div class="balance-box">
          <p class="balance-label">Balance</p>
          <p id="totalDisplay" class="total-val">₹0</p>
        </div>
        <h2 class="title">Shared List</h2>
      </div>

      <div id="catDisplay" class="cat-name" style="display:none;"></div>
      <div id="list"><div style="text-align:center; color:#64748b;">Loading...</div></div>
    </div>
    <p class="tagline">Listo apnaiye: List banegi digital, shopping hogi simple!</p>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBbBsz8FgD6_5WKbCvfqtEkPLa9q_PIhuA",
      authDomain: "listo-356ba.firebaseapp.com",
      projectId: "listo-356ba",
      storageBucket: "listo-356ba.firebasestorage.app",
      messagingSenderId: "104729909475",
      appId: "1:104729909475:web:fb3bd44800d371b7748dd6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let params = new URLSearchParams(location.search);
    let uid = params.get("uid");
    let dataParam = params.get("data");

    let globalItems = [];
    const listDiv = document.getElementById("list");
    const totalDiv = document.getElementById("totalDisplay");
    const catDiv = document.getElementById("catDisplay");

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    // Load Items
    if (uid) {
      db.collection("users").doc(uid).onSnapshot(doc => {
        if (doc.exists) {
          globalItems = doc.data().items || [];
          renderUI();
        }
      });
    } else if (dataParam) {
        parseStaticData(dataParam);
    }

    function parseStaticData(data) {
        const decoded = decodeURIComponent(data);
        let lines = decoded.split('\n');
        if (lines[0].startsWith("LISTO")) {
            catDiv.innerText = lines[0].replace("LISTO", "").replace(":", "").trim();
            catDiv.style.display = 'block';
            lines.shift();
        }
        globalItems = lines.filter(l => l.trim() !== "").map(l => ({
            name: l.replace(/^\d+\.\s*/, ''),
            price: "",
            status: "pending"
        }));
        renderUI();
    }

    function renderUI() {
      listDiv.innerHTML = "";
      let totalSpent = 0;

      globalItems.forEach((it, idx) => {
        if(it.status === "done") totalSpent += parseFloat(it.price || 0);

        let card = document.createElement("div");
        card.className = `item-card ${it.status}`;
        card.innerHTML = `
          <div class="item-header">
            <span class="item-text">${idx+1}. ${it.name}</span>
            <span class="status-badge">${it.status === 'pending' ? '' : it.status}</span>
          </div>
          <input type="number" class="price-input" placeholder="Price ₹" value="${it.price}" onchange="updatePrice(${idx}, this.value)">
          ${it.status === 'pending' ? `
            <div class="btn-group">
              <button class="btn btn-avail" onclick="updateStatus(${idx}, 'done')">Available</button>
              <button class="btn btn-na" onclick="updateStatus(${idx}, 'na')">N/A</button>
            </div>
          ` : ''}
        `;
        listDiv.appendChild(card);
      });
      totalDiv.innerText = `₹${totalSpent}`;
    }

    function updatePrice(idx, val) {
      globalItems[idx].price = val;
      sync();
    }

    function updateStatus(idx, stat) {
      globalItems[idx].status = stat;
      sync();
    }

    function sync() {
      if(uid) db.collection("users").doc(uid).set({ items: globalItems }, { merge: true });
      else renderUI();
    }
  </script>
</body>
</html>
