<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1,user-scalable=no">
  <title>Listo - Shared List</title>

  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

  <style>
    body {
      margin: 0; font-family: system-ui;
      background: linear-gradient(-45deg, #f8fafc, #edf2f7, #e2e8f0, #e0f2fe);
      background-size: 400% 400%; animation: liveBg 8s ease-in-out infinite;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px; box-sizing: border-box; min-height: 100vh;
      transition: background 0.3s ease;
    }
    @keyframes liveBg { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    /* DARK MODE TOGGLE BUTTON */
    .theme-toggle {
      position: absolute; top: 20px; right: 20px; background: white; border: 1px solid #cbd5e1;
      border-radius: 50%; width: 40px; height: 40px; font-size: 18px; cursor: pointer;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: all 0.3s ease; display: flex;
      justify-content: center; align-items: center; z-index: 100;
    }
    .theme-toggle:active { transform: scale(0.9); }

    .logo { width: 100px; height: auto; object-fit: contain; margin-top: 10px; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    .container { width: 100%; max-width: 420px; margin-bottom: 20px; }
    
    .card {
      width: 100%; background: white; border-radius: 20px; padding: 20px;
      box-sizing: border-box; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1); border: 1px solid #f1f5f9;
      transition: all 0.3s ease;
    }

    .title { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #1e293b; display: flex; justify-content: center; align-items: center; gap: 10px; transition: color 0.3s; }
    .live-badge { background-color: #ef4444; color: white; font-size: 10px; padding: 3px 8px; border-radius: 12px; animation: pulse 1.5s infinite; text-transform: uppercase; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

    .item-card { background: #f8fafc; border-radius: 12px; padding: 12px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; border: 1px solid #e2e8f0; transition: all 0.3s ease; }
    .item-card.done { background: #dcfce7; border-color: #bbf7d0; }
    .item-card.na { background: #fee2e2; border-color: #fecaca; }

    .item-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .item-text { font-size: 16px; font-weight: bold; color: #334155; word-break: break-word; flex: 1; transition: color 0.3s; }
    .item-status-text { font-size: 10px; font-weight: 900; text-transform: uppercase; margin-left: 10px; transition: color 0.3s; }
    
    .item-card.done .item-text, .item-card.done .item-status-text { color: #16a34a; }
    .item-card.na .item-text { color: #dc2626; text-decoration: line-through;}
    .item-card.na .item-status-text { color: #dc2626; }

    .price-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; outline: none; background: white; box-sizing: border-box; transition: all 0.3s ease; }
    .price-input:focus { border-color: #6366f1; }

    .action-buttons { display: flex; gap: 8px; margin-top: 5px; }
    .btn { flex: 1; padding: 10px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 13px; cursor: pointer; transition: transform 0.1s; }
    .btn:active { transform: scale(0.95); }
    .btn-avail { background: #22c55e; }
    .btn-na { background: #ef4444; }

    .loading-text { text-align: center; color: #64748b; font-style: italic; padding: 20px 0; transition: color 0.3s; }

    /* FIX: Tagline OUTSIDE the card, single line, auto-shrinks on small screens */
    .tagline { 
      width: 100%; text-align: center; font-style: italic; color: #16a34a; 
      font-weight: 600; margin-top: 15px; 
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: clamp(10px, 3.5vw, 13px); 
      transition: color 0.3s ease;
    }

    /* DARK MODE OVERRIDES */
    body.dark-mode { background: linear-gradient(-45deg, #0f172a, #1e293b, #0f172a, #334155); }
    body.dark-mode .theme-toggle { background: #334155; border-color: #475569; }
    body.dark-mode .card { background: #1e293b; border-color: #334155; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); }
    body.dark-mode .title { color: #f8fafc; }
    body.dark-mode .loading-text { color: #94a3b8; }
    body.dark-mode .item-card { background: #0f172a; border-color: #334155; }
    body.dark-mode .item-text { color: #f1f5f9; }
    body.dark-mode .price-input { background: #1e293b; color: #f8fafc; border-color: #475569; }
    
    body.dark-mode .item-card.done { background: #064e3b; border-color: #047857; }
    body.dark-mode .item-card.done .item-text, body.dark-mode .item-card.done .item-status-text { color: #6ee7b7; }
    body.dark-mode .item-card.na { background: #7f1d1d; border-color: #991b1b; }
    body.dark-mode .item-card.na .item-text, body.dark-mode .item-card.na .item-status-text { color: #fca5a5; }

    body.dark-mode .tagline { color: #4ade80; }
  </style>
</head>

<body>

  <button id="themeToggle" class="theme-toggle" onclick="toggleTheme()">🌙</button>

  <img src="https://image2url.com/r2/default/images/1774860458918-c6f7a05c-ca26-46e6-96fc-a7648f576bb0.png" class="logo" onerror="this.src='https://i.ibb.co/8nH5RSsc/Listo.png'; this.onerror=null;" alt="Listo Logo">

  <div class="container">
    <div class="card">
      <div class="title" id="mainTitle">Shared List</div>
      <div id="list"><div class="loading-text">Loading items...</div></div>
    </div>
    
    <div class="tagline">Listo apnaiye: List banegi digital, shopping hogi simple!</div>
  </div>

  <script>
    // ==========================================
    // PARSE URL PARAMETERS
    // ==========================================
    let params = new URLSearchParams(location.search);
    let uid = params.get("uid");
    let dataParam = params.get("data");
    let appTheme = params.get("theme"); // NEW: Catching theme from the App's QR Code!

    // ==========================================
    // AUTO-SYNC DARK MODE LOGIC
    // ==========================================
    const themeBtn = document.getElementById('themeToggle');
    
    // Step 1: Override with App Theme if available from QR scan
    if (appTheme === 'dark' || appTheme === 'light') {
      localStorage.setItem('theme', appTheme);
    }

    // Step 2: Apply the theme
    if (localStorage.getItem('theme') === 'dark') {
      document.body.classList.add('dark-mode');
      themeBtn.innerText = '☀️';
    }

    function toggleTheme() {
      document.body.classList.toggle('dark-mode');
      if (document.body.classList.contains('dark-mode')) {
        localStorage.setItem('theme', 'dark');
        themeBtn.innerText = '☀️';
      } else {
        localStorage.setItem('theme', 'light');
        themeBtn.innerText = '🌙';
      }
    }

    // ==========================================
    // FIREBASE CONFIGURATION
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyBbBsz8FgD6_5WKbCvfqtEkPLa9q_PIhuA",
      authDomain: "listo-356ba.firebaseapp.com",
      projectId: "listo-356ba",
      storageBucket: "listo-356ba.firebasestorage.app",
      messagingSenderId: "104729909475",
      appId: "1:104729909475:web:fb3bd44800d371b7748dd6"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let listDiv = document.getElementById("list");
    let titleDiv = document.getElementById("mainTitle");

    let globalItems = [];
    let globalBudget = "0";

    function updateItemPrice(index, priceValue) {
      globalItems[index].price = priceValue;
      saveToCloud();
    }

    function updateItemStatus(index, statusValue) {
      globalItems[index].status = statusValue;
      saveToCloud();
    }

    function saveToCloud() {
      if(!uid) return;
      db.collection("users").doc(uid).set({
        items: globalItems,
        budget: globalBudget
      }, { merge: true }).catch(err => alert("Error saving: " + err.message));
    }

    function renderList() {
      listDiv.innerHTML = "";
      
      if (globalItems.length === 0) {
        listDiv.innerHTML = `<div class="loading-text">List is currently empty!</div>`;
        return;
      }

      let pendingItems = globalItems.filter(it => it.status === "pending");
      let doneItems = globalItems.filter(it => it.status === "done");
      let naItems = globalItems.filter(it => it.status === "na");
      let sortedItems = [...pendingItems, ...doneItems, ...naItems];

      sortedItems.forEach((it, displayIndex) => {
        let realIndex = globalItems.indexOf(it);
        let itemText = `${displayIndex + 1}. ${it.name} ${it.q ? it.q : ""}`;
        
        let cardClass = "item-card";
        let statusText = "";
        if (it.status === "done") { cardClass += " done"; statusText = "Available"; }
        if (it.status === "na") { cardClass += " na"; statusText = "N/A"; }

        let actionsHtml = "";
        if (it.status === "pending") {
          actionsHtml = `
            <div class="action-buttons">
              <button class="btn btn-avail" onclick="updateItemStatus(${realIndex}, 'done')">Available</button>
              <button class="btn btn-na" onclick="updateItemStatus(${realIndex}, 'na')">N/A</button>
            </div>
          `;
        }

        let div = document.createElement("div");
        div.className = cardClass;
        div.innerHTML = `
          <div class="item-header">
            <span class="item-text">${itemText}</span>
            <span class="item-status-text">${statusText}</span>
          </div>
          <input type="number" class="price-input" placeholder="Price ₹" value="${it.price || ''}" onchange="updateItemPrice(${realIndex}, this.value)">
          ${actionsHtml}
        `;
        listDiv.appendChild(div);
      });
    }

    if (uid) {
      titleDiv.innerHTML = `Shared List <span class="live-badge">Live</span>`;

      db.collection("users").doc(uid).onSnapshot((doc) => {
        if (doc.exists) {
          globalItems = doc.data().items || [];
          globalBudget = doc.data().budget || "0";
          renderList();
        } else {
          listDiv.innerHTML = `<div class="loading-text">No list found for this ID.</div>`;
        }
      }, (error) => {
        listDiv.innerHTML = `<div class="loading-text" style="color:red;">Error loading live list.</div>`;
      });

    } else if (dataParam) {
      titleDiv.innerHTML = `Shared List`;
      listDiv.innerHTML = ""; 
      let items = decodeURIComponent(dataParam).split("\n");
      let count = 1;
      items.forEach(it => {
        if (it.trim() !== "") {
          let cleanText = it.replace(/^\d+\.\s*/, ''); 
          let div = document.createElement("div");
          div.className = "item-card";
          div.innerHTML = `<div class="item-header"><span class="item-text">${count}. ${cleanText}</span></div>`;
          listDiv.appendChild(div);
          count++;
        }
      });
    } else {
      listDiv.innerHTML = `<div class="loading-text">Please scan a valid Listo QR Code.</div>`;
    }
  </script>

</body>
</html>
